<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>InterOptimus · IOFlow Hub</title>
  <style>
    :root {
      --bg: #e8edf5;
      --bg-elev: #ffffff;
      --panel: #ffffff;
      --muted: #64748b;
      --text: #0f172a;
      --accent: #0284c7;
      --accent-soft: #e0f2fe;
      --border: #cbd5e1;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(165deg, #f1f5f9 0%, #e2e8f0 45%, #f8fafc 100%);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
    }
    header {
      padding: 1.35rem 1.6rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
      box-shadow: var(--shadow-md);
    }
    h1 { margin: 0; font-size: 1.4rem; color: #0c4a6e; }
    h2 { margin: 0 0 0.7rem; color: #0c4a6e; font-size: 1rem; }
    p.sub { margin: 0.4rem 0 0; color: var(--muted); font-size: 0.9rem; max-width: 68rem; }
    main { max-width: 1080px; margin: 0 auto; padding: 1.25rem 1.35rem 3.5rem; }
    a { color: #0369a1; text-underline-offset: 2px; }
    button {
      background: #e2e8f0;
      color: #475569;
      border: 1px solid var(--border);
      padding: 0.52rem 0.9rem;
      border-radius: 9px;
      font-weight: 650;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button.primary {
      background: linear-gradient(180deg, #0ea5e9, var(--accent));
      color: #fff;
      border: none;
      box-shadow: 0 2px 10px rgba(2, 132, 199, 0.35);
    }
    .hint { font-size: 0.82rem; color: var(--muted); margin-top: 0.5rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.65rem; align-items: center; margin: 0.55rem 0 0.65rem; }
    .task-shell {
      display: grid;
      grid-template-columns: minmax(280px, 0.8fr) minmax(420px, 1.2fr);
      gap: 1rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 860px) { .task-shell { grid-template-columns: 1fr; } }
    .task-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 1rem;
      min-height: 180px;
    }
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 620px;
      overflow: auto;
    }
    .task-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #f8fafc;
      padding: 0.55rem 0.65rem;
      cursor: pointer;
      color: var(--text);
    }
    .task-card:hover { border-color: var(--accent); background: #f0f9ff; }
    .task-card.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .task-title { font-weight: 700; font-size: 0.9rem; }
    .task-meta { color: var(--muted); font-size: 0.76rem; margin-top: 0.15rem; }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.08rem 0.45rem;
      font-size: 0.72rem;
      font-weight: 700;
      background: #e2e8f0;
      color: #475569;
      margin-left: 0.35rem;
    }
    .badge.running { background: #dbeafe; color: #1d4ed8; }
    .badge.done { background: #dcfce7; color: #15803d; }
    .badge.failed { background: #fee2e2; color: #b91c1c; }
    .task-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.55rem;
      margin-bottom: 0.75rem;
    }
    @media (max-width: 720px) { .task-detail-grid { grid-template-columns: 1fr; } }
    .kv {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.6rem;
      background: #f8fafc;
      font-size: 0.82rem;
    }
    .kv strong { display: block; color: var(--muted); font-size: 0.72rem; margin-bottom: 0.1rem; }
    .task-links, .term-list, .event-list { font-size: 0.82rem; color: var(--muted); }
    .task-links a { display: inline-block; margin: 0.15rem 0.5rem 0.15rem 0; }
    .progress-line {
      margin: 0.4rem 0 0.7rem;
      padding: 0.45rem 0.55rem;
      border-radius: 8px;
      background: #f1f5f9;
      color: #334155;
      font-size: 0.82rem;
    }
    .mini-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.4rem;
      font-size: 0.78rem;
    }
    .mini-table th, .mini-table td {
      border-bottom: 1px solid var(--border);
      padding: 0.28rem 0.35rem;
      text-align: left;
      vertical-align: top;
    }
    .mini-table th { color: var(--muted); font-weight: 700; }
    .submit-note {
      margin-bottom: 1rem;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 0.88rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>InterOptimus · IOFlow Hub</h1>
    <p class="sub">旧版工作流/任务库浏览器。新版「<a href="/manage">任务管理</a>」提供任务提交、结构 3D 可视化、CIF 下载、阶段化进度等更完整功能；本地 MLIP 交互计算请使用 <a href="/local">IOMaker Local</a>，返回 <a href="/">Portal</a>。</p>
  </header>
  <main>
    <div class="submit-note">
      新任务提交入口后续会放在这里：它应生成集群工作流并写入统一任务数据库，而不是复用本地浏览器 MLIP 提交器。
    </div>
    <section class="task-shell" aria-label="任务管理">
      <div class="task-panel">
        <h2>任务管理</h2>
        <p class="hint" style="margin-top:0;">显示已经提交/索引的界面计算任务。点击任务可查看详情和刷新远程进度。</p>
        <div class="actions">
          <button type="button" id="btn-refresh-tasks">刷新任务</button>
          <span id="task-store-hint" class="hint"></span>
        </div>
        <div id="task-list" class="task-list">
          <p class="hint">正在加载任务…</p>
        </div>
      </div>
      <div class="task-panel">
        <h2>任务详情</h2>
        <div id="task-detail">
          <p class="hint">从左侧选择任务查看结构文件、MLIP/VASP 进度、事件和结果下载。</p>
        </div>
      </div>
    </section>
  </main>
  <script>
    const taskList = document.getElementById("task-list");
    const taskDetail = document.getElementById("task-detail");
    const btnRefreshTasks = document.getElementById("btn-refresh-tasks");
    const taskStoreHint = document.getElementById("task-store-hint");

    function baseUrl() {
      return window.location.origin;
    }

    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function statusBadge(status) {
      const st = String(status || "unknown");
      let cls = "";
      if (st === "completed") cls = "done";
      else if (st === "failed" || st === "cancelled") cls = "failed";
      else if (st.indexOf("running") >= 0 || st === "queued") cls = "running";
      return '<span class="badge ' + cls + '">' + esc(st) + "</span>";
    }

    async function loadTasks(selectId) {
      taskList.innerHTML = '<p class="hint">正在加载任务…</p>';
      try {
        const res = await fetch("/api/tasks?limit=100");
        const j = await res.json();
        if (taskStoreHint) taskStoreHint.textContent = "存储: " + (j.backend || "unknown");
        const tasks = j.tasks || [];
        if (!tasks.length) {
          taskList.innerHTML = '<p class="hint">还没有任务。后续可从这里提交新的集群工作流。</p>';
          return;
        }
        taskList.innerHTML = tasks.map((t) => {
          const prog = t.progress || {};
          const vasp = t.vasp_progress || {};
          const ptxt = vasp.total
            ? " · VASP " + (vasp.finished || 0) + "/" + vasp.total
            : prog.match_terms_total
            ? " · MLIP " + prog.match_terms_done + "/" + prog.match_terms_total
            : "";
          return (
            '<button type="button" class="task-card" data-task-id="' + esc(t.task_id) + '">' +
            '<div class="task-title">' + esc(t.name || t.task_id) + statusBadge(t.status) + "</div>" +
            '<div class="task-meta">' + esc(t.mode || "mlip") + " · " + esc(t.mlip_calc || "") + ptxt + "</div>" +
            '<div class="task-meta">' + esc(t.created_at || "") + "</div>" +
            "</button>"
          );
        }).join("");
        taskList.querySelectorAll("[data-task-id]").forEach((el) => {
          el.addEventListener("click", () => openTask(el.getAttribute("data-task-id")));
        });
        if (selectId) openTask(selectId);
      } catch (e) {
        taskList.innerHTML = '<p class="hint" style="color:#b91c1c;">任务加载失败：' + esc(e) + "</p>";
      }
    }

    function artifactUrl(taskId, rel) {
      return baseUrl() + "/api/tasks/" + encodeURIComponent(taskId) + "/artifact?path=" + encodeURIComponent(rel);
    }

    async function refreshRemote(taskId) {
      await fetch("/api/tasks/" + encodeURIComponent(taskId) + "/refresh", { method: "POST" });
      await openTask(taskId);
      await loadTasks(taskId);
    }

    async function openTask(taskId) {
      if (!taskId) return;
      taskDetail.innerHTML = '<p class="hint">正在加载任务详情…</p>';
      document.querySelectorAll(".task-card").forEach((el) => {
        el.classList.toggle("active", el.getAttribute("data-task-id") === taskId);
      });
      try {
        const res = await fetch("/api/tasks/" + encodeURIComponent(taskId));
        const j = await res.json();
        if (!res.ok) throw new Error(j.detail || "HTTP " + res.status);
        const t = j.task || {};
        const arts = j.artifacts || [];
        const terms = j.match_terms || [];
        const events = j.events || [];
        const rp = t.remote_progress || {};
        const inputLinks = arts
          .filter((a) => a.kind === "input_cif")
          .map((a) => '<a href="' + artifactUrl(taskId, a.relative_path) + '" target="_blank">' + esc(a.name) + "</a>");
        const resultLinks = arts
          .filter((a) => ["plot", "report", "result_json", "log", "viz_log"].indexOf(a.kind) >= 0)
          .map((a) => '<a href="' + artifactUrl(taskId, a.relative_path) + '" target="_blank">' + esc(a.name) + "</a>");
        if (arts.find((a) => a.kind === "structure_dir")) {
          resultLinks.push('<a href="' + baseUrl() + "/api/session/" + encodeURIComponent(taskId) + '/structures.zip" target="_blank">pairs_best_it.zip</a>');
        }
        const vaspProg = t.vasp_progress || rp.expanded_vasp_job_counts || rp.vasp_job_counts || {};
        const mlipRows = terms.filter((x) => x.role !== "vasp");
        const vaspRows = terms.filter((x) => x.role === "vasp");
        const termHtml = terms.length
          ? '<table class="mini-table"><thead><tr><th>阶段</th><th>match/term</th><th>状态</th><th>作业</th></tr></thead><tbody>' +
            terms.slice(0, 160).map((x) => {
              const isVasp = x.role === "vasp";
              const mt = x.match_id >= 0 ? "match " + esc(x.match_id) + " / term " + esc(x.term_id) : esc(x.label || "-");
              const job = isVasp ? esc(x.name || x.uuid || x.vasp_kind || "") : esc(x.image || "");
              return "<tr><td>" + (isVasp ? "VASP" : "MLIP") + "</td><td>" + mt + "</td><td>" + esc(x.status || x.state || "unknown") + "</td><td>" + job + "</td></tr>";
            }).join("") +
            "</tbody></table>"
          : "暂无 match/term 明细。";
        const eventHtml = events.length
          ? events.slice(-10).reverse().map((e) => esc(e.created_at || "") + " · " + esc(e.event || "") + " · " + esc(e.message || "")).join("<br/>")
          : "暂无事件。";
        taskDetail.innerHTML =
          '<div class="actions"><button type="button" class="primary" onclick="refreshRemote(\'' + esc(taskId) + '\')">刷新远程进度</button></div>' +
          '<div class="task-detail-grid">' +
          '<div class="kv"><strong>任务</strong>' + esc(t.name || t.task_id) + "<br/><code>" + esc(t.task_id) + "</code></div>" +
          '<div class="kv"><strong>状态</strong>' + statusBadge(t.status) + "<br/>" + esc(t.phase || rp.current_phase || "") + "</div>" +
          '<div class="kv"><strong>输入结构</strong>' + esc(t.film_name || "film.cif") + "<br/>" + esc(t.substrate_name || "substrate.cif") + "</div>" +
          '<div class="kv"><strong>远程引用</strong>MLIP: <code>' + esc(t.mlip_job_uuid || "") + "</code><br/>Flow: <code>" + esc(t.flow_uuid || "") + "</code></div>" +
          "</div>" +
          '<div class="progress-line"><strong>阶段摘要：</strong>' + esc(t.stage_summary || rp.stage_summary || "等待远程进度。") +
          (vaspProg.total ? "<br/><strong>VASP：</strong>" + esc(vaspProg.finished || 0) + "/" + esc(vaspProg.total || 0) + " finished (running " + esc(vaspProg.running || 0) + ", pending " + esc(vaspProg.pending || 0) + ", failed " + esc(vaspProg.failed || 0) + ")" : "") +
          "</div>" +
          '<div class="task-links"><strong>输入 CIF：</strong> ' + (inputLinks.join(" · ") || "无") + "</div>" +
          '<div class="task-links" style="margin-top:0.35rem;"><strong>结果文件：</strong> ' + (resultLinks.join(" · ") || "任务完成后显示") + "</div>" +
          '<div class="term-list" style="margin-top:0.7rem;"><strong>match / term 进度</strong><br/><span class="hint">MLIP rows: ' + esc(mlipRows.length) + " · VASP rows: " + esc(vaspRows.length) + "</span>" + termHtml + "</div>" +
          '<div class="event-list" style="margin-top:0.75rem;"><strong>最近事件</strong><br/>' + eventHtml + "</div>";
      } catch (e) {
        taskDetail.innerHTML = '<p class="hint" style="color:#b91c1c;">详情加载失败：' + esc(e) + "</p>";
      }
    }

    btnRefreshTasks.addEventListener("click", () => loadTasks());
    loadTasks();
  </script>
</body>
</html>
